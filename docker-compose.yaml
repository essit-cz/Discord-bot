services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?DISCORD_TOKEN must be set}

      LLM_BASE_URL: ${LLM_BASE_URL:-http://192.168.100.252:8000/v1}
      LLM_MODEL: ${LLM_MODEL:-Qwen/Qwen3-8B}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2048}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-120}

      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://192.168.100.252:8080}
      SEARXNG_TIMEOUT: ${SEARXNG_TIMEOUT:-10}

      HISTORY_TTL_SECONDS: ${HISTORY_TTL_SECONDS:-3600}
      HISTORY_TOKEN_BUDGET: ${HISTORY_TOKEN_BUDGET:-4096}

      SEARCH_ENABLED: ${SEARCH_ENABLED:-true}

      BOT_PREFIX: ${BOT_PREFIX:-!}
      BOT_STATUS_NAME: ${BOT_STATUS_NAME:-Odysseus}
      BOT_STATUS_TYPE: ${BOT_STATUS_TYPE:-0}

    volumes:
      - discord-bot-logs:/app/logs

volumes:
  discord-bot-logs:
